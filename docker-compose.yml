services:
  hop-lab:
    build:
      context: .
      dockerfile: dockerfile
    image: hop_lab
    container_name: hop_lab
    network_mode: host
    privileged: true
    environment:
      - USER=${USER_LAB:-hoplab}
      - PASS=${PASS_LAB:-hoplab123}
      - VNC_PASS=${VNC_PASS:-kalilab}
      - DISPLAY=:1
    volumes:
      - ${HOST_PATH_LAB:-/home/$USER/Hoplab}:/home/${USER_LAB:-hoplab}
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    stdin_open: true
    tty: true
    command: ["/opt/start-services.sh"]
